name: Nachtelijke taken (23:59 NL-tijd)

on:
  schedule:
    - cron: '59 21 * * *'
    - cron: '59 22 * * *'
    - cron: '30 3 * * 1'
    - cron: '30 4 * * 1'
  workflow_dispatch:

jobs:
  nachtelijke-taken:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installeer dependencies
        run: npm install firebase-admin

      - name: Schrijf service account naar bestand
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceaccount.json

      - name: Auto-uitchecken en oude data verwijderen
        run: node cleanup.js
        env:
          GOOGLE_APPLICATION_CREDENTIALS: serviceaccount.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Verwijder service account bestand
        if: always()
        run: rm -f serviceaccount.json
