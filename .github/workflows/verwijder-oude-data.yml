name: Nachtelijke taken (23:59 NL-tijd)

on:
  schedule:
    - cron: '59 21 * * *'  # 21:59 UTC = 23:59 Nederlandse zomertijd (UTC+2)
    - cron: '59 22 * * *'  # 22:59 UTC = 23:59 Nederlandse wintertijd (UTC+1)
    - cron: '30 3 * * 1'   # Maandag 05:30 NL zomertijd (houdt workflow actief)
    - cron: '30 4 * * 1'   # Maandag 05:30 NL wintertijd (houdt workflow actief)
  workflow_dispatch:

jobs:
  nachtelijke-taken:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installeer dependencies
        run: npm install firebase-admin

      - name: Auto-uitchecken en oude data verwijderen
        run: node cleanup.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
