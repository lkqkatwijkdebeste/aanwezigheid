name: Nachtelijke taken (23:59 NL-tijd)

on:
  schedule:
    - cron: '59 21 * * *'  # 21:59 UTC = 23:59 Nederlandse zomertijd (UTC+2)
    - cron: '59 22 * * *'  # 22:59 UTC = 23:59 Nederlandse wintertijd (UTC+1)
    - cron: '30 3 * * 1'   # Maandag 05:30 NL zomertijd (houdt workflow actief)
    - cron: '30 4 * * 1'   # Maandag 05:30 NL wintertijd (houdt workflow actief)
  workflow_dispatch:

jobs:
  nachtelijke-taken:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-uitchecken en oude data verwijderen
        run: |
          npm install firebase-admin
          cat > script.js << 'SCRIPT'
          const admin = require('firebase-admin');

          let serviceAccount;
          try {
            serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          } catch(e) {
            console.error('Kon service account niet inlezen:', e.message);
            process.exit(1);
          }

          if (!serviceAccount || !serviceAccount.private_key) {
            console.error('Service account mist private_key. Controleer de GitHub secret.');
            process.exit(1);
          }

          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });

          const db = admin.firestore();

          async function run() {
            const snap = await db.collection('aanwezigheid').get();
            const entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            entries.sort((a, b) => {
              const ta = a.tijdstip ? a.tijdstip.seconds : 0;
              const tb = b.tijdstip ? b.tijdstip.seconds : 0;
              return ta - tb;
            });

            const last = {};
            for (const e of entries) last[e.naam.toLowerCase()] = e;
            const nogAanwezig = Object.values(last).filter(e => e.type === 'in');

            const nu = new Date();
            const vandaag = nu.toLocaleDateString('nl-NL', { timeZone: 'Europe/Amsterdam' });
            const uurUTC = nu.getUTCHours();
            const uitcheckenActief = uurUTC >= 21 || uurUTC < 2;

            const alUitgecheckt = new Set(
              entries
                .filter(e => e.automatisch === true && e.datum === vandaag && e.type === 'out')
                .map(e => e.naam.toLowerCase())
            );

            let aantalUit = 0;
            if (uitcheckenActief) {
              const verlooptDatum = new Date(nu.getTime() + 30 * 24 * 60 * 60 * 1000);
              for (const persoon of nogAanwezig) {
                if (alUitgecheckt.has(persoon.naam.toLowerCase())) continue;
                await db.collection('aanwezigheid').add({
                  naam: persoon.naam,
                  bedrijf: persoon.bedrijf || 'LKQ',
                  type: 'out',
                  tijdstip: admin.firestore.Timestamp.now(),
                  datum: vandaag,
                  tijd: '23:59',
                  verloopt: new Date(nu.getTime() + 30 * 24 * 60 * 60 * 1000),
                  automatisch: true
                });
                aantalUit++;
              }
            }
            console.log('Uitchecken actief: ' + uitcheckenActief + ' | Uitgecheckt: ' + aantalUit);

            const grens = new Date(nu.getTime() - 30 * 24 * 60 * 60 * 1000);
            const oudSnap = await db.collection('aanwezigheid')
              .where('tijdstip', '<', grens).get();

            const batch = db.batch();
            oudSnap.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            console.log('Oude data verwijderd: ' + oudSnap.size + ' registraties.');

            process.exit(0);
          }

          run().catch(err => { console.error('Fout:', err); process.exit(1); });
          SCRIPT
          - name: Debug secret
        run: |
          echo "Secret lengte: ${#FIREBASE_SERVICE_ACCOUNT}"
          echo "Eerste 50 tekens: ${FIREBASE_SERVICE_ACCOUNT:0:50}"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}node script.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
